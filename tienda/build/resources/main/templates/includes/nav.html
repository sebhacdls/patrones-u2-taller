<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Menú Navegación</title>
    <meta charset="utf-8" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        /* Estilo extra para que los submenús se vean hacia el lado como en la imagen */
        .dropdown-submenu { position: relative; }
        .dropdown-submenu .dropdown-menu {
            top: 0;
            left: 100%;
            margin-top: -1px;
        }
        .dropdown-submenu:hover > .dropdown-menu { display: block; }
        
        /* Hover para el menú principal de Categorías */
        .categorias-dropdown:hover .dropdown-menu {
            display: block !important;
        }
        
        /* Ajuste para submenús laterales */
        .dropdown-submenu > .dropdown-menu {
            top: 0;
            left: 100%;
            margin-top: -1px;
            display: none; /* Oculto por defecto */
        }
        .dropdown-submenu:hover > .dropdown-menu {
            display: block; /* Se muestra al pasar el mouse sobre el padre */
        }
    </style>
</head>

<body>
    <template data-th-remove="all">
        <ul data-th-if="${!#lists.isEmpty(submenu)}"
            data-th-fragment="submenu(id, submenu)" 
            class="dropdown-menu">
            
            <li data-th-each="obj : ${submenu}" th:classappend="${obj.tieneHijos()} ? 'dropdown-submenu' : ''">
                <a class="dropdown-item" 
                   data-th-href="@{${obj.enlace}}" 
                   data-th-text="${obj.texto}">Subitem</a>
                
                <ul data-th-if="${obj.tieneHijos()}" 
                    data-th-replace="~{ ::submenu( ${obj.slug}, ${obj.hijos} ) }"></ul>
            </li>           
        </ul>
    </template>

    <nav data-th-fragment="nav" class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">      
        <div class="container px-4 px-lg-5">
            
            <a class="navbar-brand" data-th-href="@{/}" href="#"><strong>Deccos</strong></a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
                
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-4">                     
                    
                    <li class="nav-item">
                        <a class="nav-link" data-th-href="@{/}">Inicio</a>
                    </li>

                    <li class="nav-item dropdown categorias-dropdown">
                        <a class="nav-link dropdown-toggle" 
                           href="#" 
                           id="navbarDropdown" 
                           role="button"
                           aria-expanded="false">
                           Categorías
                        </a>
                        
                        <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
                            <li th:if="${#lists.isEmpty(menu)}">
                                <a class="dropdown-item" href="#">No hay categorías</a>
                            </li>
                            <li data-th-each="item : ${menu}" 
                                th:if="${item.texto != 'Inicio'}"
                                th:classappend="${item.tieneHijos()} ? 'dropdown-submenu' : ''">
                                
                                <a class="dropdown-item" 
                                   data-th-href="@{${item.enlace}}" 
                                   data-th-text="${item.texto}">Categoría</a>
                                
                                <ul data-th-if="${item.tieneHijos()}" 
                                    data-th-replace="~{ ::submenu( ${item.slug}, ${item.hijos} ) }"></ul>
                            </li>
                        </ul>
                    </li>

                    <li class="nav-item"><a class="nav-link" href="/ubicacion">Ubicación</a></li>
                    <li class="nav-item"><a class="nav-link" href="/contacto">Contacto</a></li>
                </ul>
                
                <div class="d-flex align-items-center">
                    <span class="navbar-text me-3">
                        Bienvenido <strong th:text="${usuarioActual}">Invitado</strong>
                    </span>
                    
                    <a class="btn btn-sm btn-outline-secondary me-2" 
                       data-th-href="@{/ingresar}" 
                       data-sec-authorize="!isAuthenticated()">Ingresar</a>
                    
                    <a class="btn btn-sm btn-outline-danger me-2" 
                       data-th-href="@{/logout}" 
                       data-sec-authorize="isAuthenticated()">Salir</a>

                    <a data-th-href="@{/carrito}" class="btn btn-outline-dark">
                        <i class="bi-cart-fill me-1"></i>
                        Carro
                        <span class="badge bg-dark text-white ms-1 rounded-pill">0</span>
                    </a>
                </div>
                
            </div>
        </div>
    </nav>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Script adicional para asegurar el hover
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Script cargado');
            const dropdown = document.querySelector('.categorias-dropdown');
            console.log('Dropdown encontrado:', dropdown);
            if (dropdown) {
                const dropdownMenu = dropdown.querySelector('.dropdown-menu');
                console.log('Menu encontrado:', dropdownMenu);
                
                dropdown.addEventListener('mouseenter', function() {
                    console.log('Mouse enter');
                    dropdownMenu.classList.add('show');
                });
                
                dropdown.addEventListener('mouseleave', function() {
                    console.log('Mouse leave');
                    dropdownMenu.classList.remove('show');
                });
            }
        });
    </script>
</body>
</html>
